services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ngb_dev
    ports:
      - "5432:5432"
    volumes:
      - ngb_pg_data:/var/lib/postgresql/data

volumes:
  ngb_pg_data:
